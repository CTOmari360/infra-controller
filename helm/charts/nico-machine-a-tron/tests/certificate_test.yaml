suite: certificate tests
templates:
  - certificate.yaml
tests:
  - it: should create a certificate with default values
    asserts:
      - isKind:
          of: Certificate
      - equal:
          path: metadata.name
          value: nico-machine-a-tron-certificate

  - it: should use custom certificate settings
    set:
      certificate:
        serviceName: custom-service
        extraDnsNames:
          - extra.example.com
    asserts:
      - isKind:
          of: Certificate
